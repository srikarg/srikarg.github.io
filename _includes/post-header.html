<a class="top smooth-scroll" href="#">Back to Top</a>

<header class="post-header">
    <h1 class="animated bounceInDown">{{ page.title }}</h1>
    <p class="animated zoomIn post-date">Published on
        {{ page.date | date: "%d %B %Y" }}
        {% if page.comments %}
        with
        <a class="smooth-scroll" href="#disqus_thread"></a>
        {% endif %}.</p>
</header>
